<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Orders - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">JORDAN ADMIN</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
        <a href="../index.html"><i class="fas fa-store"></i> Back to Shop</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="page-title">Order Management</h2>
        <button id="toggle-trash-btn" class="btn btn-secondary"><i class="fas fa-trash"></i> View Trash</button>
      </div>
      <p style="color:#888;">Delete moves orders to trash. Restore them from View Trash.</p>
      <table id="orders-table" class="table table-striped">
        <thead>
          <tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        </thead>
      </table>
    </main>
  </div>

  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Update Order Status</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          <form id="order-form">
            <input type="hidden" name="order_id" id="order-id">
            <div class="form-group">
              <label>Order #</label>
              <input id="order-display-id" class="form-control" readonly>
            </div>
            <div class="form-group">
              <label>Status *</label>
              <select name="status" id="order-status" class="form-control">
                <option value="">Select status</option>
                <option value="Pending">Pending</option>
                <option value="Processing">Processing</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
              </select>
            </div>
            <div class="form-group">
              <label>Admin Note *</label>
              <textarea name="admin_note" id="order-note" class="form-control" rows="3" placeholder="Reason for status change (min. 5 characters)"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" form="order-form" class="btn btn-primary">Update Status</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/admin-orders.js"></script>
</body>
</html>
