<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">JORDAN ADMIN</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
        <a href="../index.html"><i class="fas fa-store"></i> Back to Shop</a>
      </nav>
    </aside>
    <main class="main-content">
      <h2 class="mb-4">Dashboard</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-products">0</div><div class="stat-label">Total Products</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-users">0</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-orders">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-revenue">₱0</div><div class="stat-label">Total Revenue</div></div>
      </div>
      <div class="row">
        <div class="col-md-6"><div class="chart-container"><canvas id="barChart"></canvas></div></div>
        <div class="col-md-6"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
        <div class="col-md-6"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/charts.js"></script>
</body>
</html>
