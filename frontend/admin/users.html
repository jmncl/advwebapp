<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">JORDAN ADMIN</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="users.html" class="active"><i class="fas fa-users"></i> Users</a>
        <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
        <a href="../index.html"><i class="fas fa-store"></i> Back to Shop</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="page-title">User Management</h2>
        <div>
          <button id="toggle-trash-btn" class="btn btn-secondary mr-2"><i class="fas fa-trash"></i> View Trash</button>
          <button id="add-user-btn" class="btn btn-primary" data-toggle="modal" data-target="#userModal"><i class="fas fa-user-plus"></i> Add User</button>
        </div>
      </div>
      <table id="users-table" class="table table-striped">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
        </thead>
      </table>
    </main>
  </div>

  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="user-modal-title">Add User</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          <form id="user-form">
            <input type="hidden" id="user-id">
            <div class="form-group">
              <label>Name *</label>
              <input name="name" id="user-name" class="form-control">
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input name="email" id="user-email" type="email" class="form-control">
            </div>
            <div class="form-group user-password-field">
              <label>Password *</label>
              <input name="password" id="user-password" type="password" class="form-control">
            </div>
            <div class="form-group user-password-field">
              <label>Confirm Password *</label>
              <input name="confirm_password" id="user-confirm-password" type="password" class="form-control">
            </div>
            <div class="form-group">
              <label>Role *</label>
              <select name="role" id="user-role" class="form-control">
                <option value="">Select role</option>
                <option value="customer">Customer</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" form="user-form" class="btn btn-primary">Save User</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/additional-methods.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/users.js"></script>
</body>
</html>
