<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">JORDAN <span>BRAND</span></a>
  </nav>

  <div class="form-wrap">
    <h2 class="form-title">Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@jordanstore.com">
        <span id="email-error" class="error-msg">Email is required.</span>
        <span id="email-format-error" class="error-msg">Invalid email format.</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="admin123">
        <span id="password-error" class="error-msg">Password is required.</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
      <p class="text-center mt-3">No account? <a href="register.html">Register here</a></p>
      <p class="text-center mt-2" style="font-size:0.8rem;color:#888;">
        Demo: admin@jordanstore.com / admin123<br>
        Customer: customer@jordanstore.com / customer123
      </p>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
