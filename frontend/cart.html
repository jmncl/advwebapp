<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">JORDAN <span>BRAND</span></a>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-store"></i> Shop</a>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Shopping Cart</h2>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead>
            <tr><th></th><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr>
          </thead>
          <tbody id="cart-body"></tbody>
        </table>
        <div class="text-right">
          <h4>Total: <span id="cart-total">₱0.00</span></h4>
          <a href="checkout.html" id="checkout-btn" class="btn btn-primary mt-2" style="display:none;">
            <i class="fas fa-credit-card"></i> Proceed to Checkout
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
