<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - Jordan Brand Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">JORDAN <span>BRAND</span></a>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-store"></i> Shop</a>
      <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <div class="container py-4">
    <div id="product-loading" class="loading-msg">Loading product...</div>
    <div id="product-content" class="product-detail-card row" style="display:none;">
      <div class="col-md-5">
        <div class="product-gallery">
          <div class="gallery-main" id="main-image">
            <div class="placeholder-img gallery-placeholder"><i class="fas fa-shoe-prints"></i></div>
          </div>
          <div class="gallery-thumbs-wrap">
            <button type="button" class="gallery-nav gallery-prev" id="gallery-prev" aria-label="Previous photos">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div class="gallery-thumbs" id="photo-gallery"></div>
            <button type="button" class="gallery-nav gallery-next" id="gallery-next" aria-label="Next photos">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="col-md-7 product-detail-info">
        <h2 id="product-name"></h2>
        <p><strong>Item Code:</strong> <span id="product-code"></span></p>
        <p><strong>Category:</strong> <span id="product-category"></span></p>
        <p><strong>Size:</strong> <span id="product-size"></span></p>
        <h3 id="product-price"></h3>
        <p id="product-stock"></p>
        <p id="product-desc"></p>
        <form id="add-cart-form" class="mt-3">
          <div class="form-group" style="max-width:120px;">
            <label>Quantity</label>
            <input type="number" id="qty" class="form-control" value="1" min="1">
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-cart-plus"></i> Add to Cart</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
